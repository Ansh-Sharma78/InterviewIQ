server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: interviewiq
  ai:
    model:
      chat: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3:8b}
          temperature: 0.2
          num-predict: 1800
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:interviewiq}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:interviewiq}
    password: ${DB_PASSWORD:interviewiq}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

app:
  ai:
    provider: ${APP_AI_PROVIDER:local}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5.5}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3:8b}
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-3.5-flash}
  storage:
    local-root: ${LOCAL_STORAGE_ROOT:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:[*],http://127.0.0.1:[*]}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-64-chars-for-dev-only}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
  cookies:
    secure: ${COOKIE_SECURE:false}
    same-site: Strict
